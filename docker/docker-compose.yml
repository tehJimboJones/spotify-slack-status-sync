version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    container_name: spotify-status-bot-app
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      - db

  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: spotify-status-bot-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-spotify_bot}
      MYSQL_USER: ${DB_USER:-bot_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bot_pass}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
